<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/media.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body>

    <main>
        <h1 class="header">Weather App</h1>
        <input type="search" placeholder="Find your location...">
        <button>Find</button>
        <div class="weather-cards">
            <div class="outer">
                <div class="first-day inner">
                    <div class="title">
                        <p>Tuesday</p>
                        <p class="date">26May</p>
                    </div>
                    <div class="details">
                        <p>Cairo</p>
                        <h1>22.1oC</h1>
                        <!-- <img src="" alt="Logo"> -->
                        <p>Clear</p>
                        <div class="status">
                            <div>
                                <i class="fa-solid fa-umbrella"></i>
                                20%
                            </div>
                            <div>
                                <i class="fa-solid fa-wind"></i>
                                18km/h
                            </div>
                            <div>
                                <i class="fa-solid fa-compass"></i>
                                East
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="outer">
                <div class="second-day inner">
                    <div class="title">
                        <p>Wednesday</p>
                    </div>
                    <div class="details">
                        <!-- <img src="" alt="Logo"> -->
                        <h2>32.9oC</h2>
                        <p>20.1o</p>
                        <p>Sunny</p>
                    </div>
                </div>
            </div>

            <div class="outer">
                <div class="third-day inner">
                    <div class="title">
                        <p>Thursday</p>
                    </div>
                    <div class="details">
                        <!-- <img src="" alt="Logo"> -->
                        <h2>333.3oC</h2>
                        <p>21.6o</p>
                        <p>Sunny</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="./js/main.js"></script>
</body>

</html>
